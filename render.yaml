services:
  - type: web
    name: tikprompt-studio
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile=false && pnpm prisma:deploy && pnpm build
    startCommand: pnpm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tikprompt-studio-db
          property: connectionString

databases:
  - name: tikprompt-studio-db
    plan: basic-256mb
